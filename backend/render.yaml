services:
  - type: web
    name: music-stream-backend
    runtime: node
    buildCommand: |
      mkdir -p bin
      curl -fsSL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o bin/yt-dlp
      chmod a+rx bin/yt-dlp
      npm install
      npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: YTDLP_PROXY
        value: http://njykdqoc:4802hockovky@198.23.239.134:6540
      - key: YTDLP_JS_RUNTIME
        value: node