services:
  - type: web
    name: music-stream-backend
    runtime: node
    buildCommand: |
      npm install
      npm run build
      mkdir -p backend/bin
      curl -fsSL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o backend/bin/yt-dlp
      chmod a+rx backend/bin/yt-dlp
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000