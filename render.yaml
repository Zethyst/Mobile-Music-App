services:
  - type: web
    name: music-stream-backend
    runtime: node
    rootDir: backend 
    buildCommand: |
      curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
      chmod a+rx /usr/local/bin/yt-dlp
      npm install
      npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000