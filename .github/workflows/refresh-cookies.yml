name: Refresh YouTube Cookies

on:
  schedule:
    - cron: "0 3 * * *"   # daily at 3:00 AM UTC

  workflow_dispatch:
    inputs:
      force_login:
        description: "Force re-login (use if session is broken)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  refresh-cookies:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Refresh cookies
        env:
          HEADLESS: "true"
          COOKIES_OUTPUT: "./backend/cookies.txt"
          YT_COOKIES_JSON: ${{ secrets.YT_COOKIES_JSON }}
          YT_PROXY: ${{ secrets.YT_PROXY }}
        run: python backend/refresh_cookies.py

      - name: Update YT_COOKIES_JSON secret
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f /tmp/yt_cookies_refreshed.json ]; then
            gh secret set YT_COOKIES_JSON \
              --repo ${{ github.repository }} \
              < /tmp/yt_cookies_refreshed.json
            echo "YT_COOKIES_JSON secret updated."
          else
            echo "No refreshed cookies file found — skipping secret update."
          fi

      - name: Commit updated cookies
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add backend/cookies.txt

          if git diff --staged --quiet; then
            echo "cookies.txt unchanged — skipping commit."
          else
            git commit -m "chore: auto-refresh cookies [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
            echo "Pushed updated cookies.txt"
          fi